services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - core
    networks:
      - lumina-network

  core:
    build: ./services/core
    ports:
      - "3000:3000"
    env_file:
      - ./services/core/.env
    depends_on:
      - db
    networks:
      - lumina-network

  model:
    build: ./services/model
    networks:
      - lumina-network

  lightbulb:
    build: ./services/lightbulb
    ports:
      - "5000:5000"
    networks:
      - lumina-network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_DATABASE=${DB_NAME}
      - DB_ADMIN_USER=${DB_ADMIN_USER}
      - DB_ADMIN_PASS=${DB_ADMIN_PASS}
      - DB_RESTRICTED_USER=${DB_RESTRICTED_USER}
      - DB_RESTRICTED_PASS=${DB_RESTRICTED_PASS}
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/init.sh:/docker-entrypoint-initdb.d/02-init.sh
    networks:
      - lumina-network

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - lumina-network

volumes:
  dbdata:

networks:
  lumina-network:
    driver: bridge